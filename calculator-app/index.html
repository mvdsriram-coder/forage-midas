<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <meta name="description" content="A modern, accessible calculator app" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230066ff'/><text x='50' y='63' font-size='64' text-anchor='middle' fill='white'>≡</text></svg>" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app__header">
        <h1 class="app__title" aria-label="Calculator">Calculator</h1>
        <div class="theme-toggle">
          <input id="theme-toggle" type="checkbox" aria-label="Toggle dark mode" />
          <label for="theme-toggle" title="Toggle dark mode">
            <span class="sun">☀</span>
            <span class="moon">🌙</span>
          </label>
        </div>
      </header>

      <main class="calculator" role="application" aria-label="Calculator">
        <section class="display" aria-live="polite" aria-atomic="true">
          <div id="display-expression" class="display__expression" aria-label="Expression"></div>
          <div id="display-current" class="display__current" aria-label="Current input">0</div>
        </section>

        <section class="keypad" aria-label="Keypad">
          <button class="btn btn--sec" data-action="clear" aria-label="All clear">AC</button>
          <button class="btn btn--sec" data-action="sign" aria-label="Toggle sign">±</button>
          <button class="btn btn--sec" data-action="percent" aria-label="Percent">%</button>
          <button class="btn btn--op" data-op="/" aria-label="Divide">÷</button>

          <button class="btn" data-digit="7">7</button>
          <button class="btn" data-digit="8">8</button>
          <button class="btn" data-digit="9">9</button>
          <button class="btn btn--op" data-op="*" aria-label="Multiply">×</button>

          <button class="btn" data-digit="4">4</button>
          <button class="btn" data-digit="5">5</button>
          <button class="btn" data-digit="6">6</button>
          <button class="btn btn--op" data-op="-" aria-label="Subtract">−</button>

          <button class="btn" data-digit="1">1</button>
          <button class="btn" data-digit="2">2</button>
          <button class="btn" data-digit="3">3</button>
          <button class="btn btn--op" data-op="+" aria-label="Add">+</button>

          <button class="btn" data-paren="(">(</button>
          <button class="btn" data-digit="0">0</button>
          <button class="btn" data-dot=".">.</button>
          <button class="btn" data-paren=")">)</button>

          <button class="btn btn--wide" data-action="backspace" aria-label="Backspace">⌫</button>
          <button class="btn btn--eq" data-action="equals" aria-label="Equals">=</button>
        </section>

        <section class="history">
          <div class="history__header">
            <h2>History</h2>
            <button id="clear-history" class="link" aria-label="Clear history">Clear</button>
          </div>
          <ol id="history-list" class="history__list" aria-live="polite"></ol>
        </section>
      </main>

      <footer class="app__footer">
        <span>Keyboard friendly: 0-9, + - * /, ( ), ., Enter, Backspace, Esc</span>
      </footer>
    </div>

    <script src="./script.js" type="module"></script>
  </body>
</html>
